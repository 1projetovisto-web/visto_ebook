<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ebook Core0gam3 - Projeto V.I.S.T.O</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
        }

        /* Container principal que cria o espaço seguro na base para a barra do Canva */
        .visto-viewport {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100% - 50px); /* Reserva 50px na base para a barra respirar */
            overflow: hidden;
        }

        /* O iframe é levemente reduzido para caber na nova área sem cortar absolutamente nada */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            transform: scale(0.97); /* Reduz em 3% o e-book para dar o recuo perfeito */
            transform-origin: top center; /* Garante que o alinhamento comece pelo topo */
        }
    </style>
</head>
<body>

    <div class="visto-viewport">
        <iframe 
            src="https://www.canva.com/design/DAHM2e0tPzc/vncxVURq2SgVhKoe3oKDIA/view?embed" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
            allowfullscreen>
        </iframe>
    </div>

</body>
</html>
