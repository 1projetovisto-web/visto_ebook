    <title>Ebook Core0gam3 - Projeto V.I.S.T.O</title>
    <style>
        /* Garante que o e-book ocupe a tela inteira sem barras de rolagem duplas */

            margin: 0;

        }

            position: absolute;
            top: 0;

        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="visto-player-container">
        <!-- Seu link oficial do Canva configurado com permissões de mídia e interatividade -->

</body>
</html>
