<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ebook Core0gam3 - Projeto V.I.S.T.O</title>
    <style>
        /* Reseta a página para ocupar 100% da tela sem barras de rolagem extras */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
        }
        /* Container responsivo que envelopa o site do Canva */
        .visto-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="visto-container">
        <!-- Espelho dinâmico do e-book hospedado no Canva -->
        <iframe 
            src="https://vistoebook.my.canva.site/" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
            allowfullscreen>
        </iframe>
    </div>

</body>
</html>
